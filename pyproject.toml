[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cognitive-discovery-system"
version = "0.0.1"
description = "Open-source research assistant for scientific discovery, mathematical modeling, and structured reasoning."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }

[project.optional-dependencies]
test = ["pytest>=7.0", "pytest-cov>=4.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=cds --cov-report=term-missing --cov-report=xml"

[tool.coverage.run]
branch = true
source = ["cds"]

[tool.coverage.report]
show_missing = true

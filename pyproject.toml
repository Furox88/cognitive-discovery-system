[project]
name = "cognitive-discovery-platform"
version = "0.8.2"
description = "Pure Python computational science platform — quantum simulation, FFT, optimization, probability, statistics, and more."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Furox88", email = "furkanarkn1451@gmail.com"}
]
keywords = ["quantum", "fft", "optimization", "probability", "statistics", "scientific-computing", "signal-processing", "pure-python", "graph-theory", "monte-carlo", "differential-equations", "linear-algebra"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Physics",
]

dependencies = [
    "typer[all]>=0.9.0",
    "pydantic>=2.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dashboard = [
    "streamlit>=1.30.0",
    "pandas",
]
test = [
    "pytest>=8.0",
    "pytest-cov",
]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pre-commit",
    "build",
    "twine",
    "ipykernel",
    "notebook",
]
docs = [
    "mkdocs>=1.5.0",
    "mkdocs-material>=9.0.0",
    "mkdocstrings[python]>=0.24.0",
]

[project.scripts]
cds = "cds.cli:app"

[project.urls]
Homepage = "https://github.com/Furox88/cognitive-discovery-system"
Repository = "https://github.com/Furox88/cognitive-discovery-system"
Documentation = "https://furox88.github.io/cognitive-discovery-system/"
"PyPI" = "https://pypi.org/project/cognitive-discovery-platform/"
Issues = "https://github.com/Furox88/cognitive-discovery-system/issues"
Changelog = "https://github.com/Furox88/cognitive-discovery-system/releases"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cds"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = ["--strict-markers", "--strict-config"]

[tool.coverage.run]
source = ["src/cds"]
# Branch coverage is intentionally OFF. The numerical helper functions in
# `cds.stats.hypothesis_tests` (`_gser`, `_gcf`) have for-loops whose
# natural-end branch is mathematically unreachable for convergent inputs;
# these are validated end-to-end via the higher-level chi2_sf / gamma_sf
# tests, but triggering the natural-end branch in unit tests would require
# constructing inputs that defeat Numerical Recipes convergence, which
# adds noise without improving real coverage. Statement coverage remains
# enforced at 100%.

[tool.coverage.report]
# CDS targets 100% statement coverage. CI enforces this on Python 3.12
# (the release-gate version) via --cov-fail-under=100. Other matrix Python
# versions (3.10, 3.11) only report coverage, since micro-differences in
# their stdlib (e.g. typing.Union, statistics) occasionally surface a
# 1-statement miss that the 3.12 baseline covers.
fail_under = 99
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "\\.\\.\\.",
]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
strict = true
ignore_missing_imports = true

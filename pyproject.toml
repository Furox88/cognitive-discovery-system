[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "cognitive-discovery-system"
version = "0.1.0"
description = "Open-source research assistant for scientific discovery, mathematical modeling, and structured reasoning."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Furox88" }]
keywords = [
    "research",
    "science",
    "hypothesis",
    "modeling",
    "discovery",
    "knowledge-management",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/Furox88/cognitive-discovery-system"
Documentation = "https://github.com/Furox88/cognitive-discovery-system#readme"
Repository = "https://github.com/Furox88/cognitive-discovery-system"
Issues = "https://github.com/Furox88/cognitive-discovery-system/issues"
Changelog = "https://github.com/Furox88/cognitive-discovery-system/blob/main/CHANGELOG.md"

[project.scripts]
cds = "cds.cli:main"

[project.optional-dependencies]
test = ["pytest>=7.0", "pytest-cov>=4.0"]
docs = ["mkdocs>=1.5", "mkdocs-material>=9.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=cds --cov-report=term-missing --cov-report=xml"

[tool.coverage.run]
branch = true
source = ["cds"]

[tool.coverage.report]
show_missing = true
fail_under = 80

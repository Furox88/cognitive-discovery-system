# git-cliff configuration for cognitive-discovery-system
# Documentation: https://git-cliff.org/docs/configuration
#
# Generates CHANGELOG.md from git history. Tag-based grouping (no conventional
# commits required) — the project uses simple `release: vX.Y.Z` style messages.
#
# Usage:
#   git cliff --tag v0.9.0b1..HEAD   # preview unreleased changes
#   git cliff --latest               # generate latest tag's section
#   git cliff --unreleased           # everything since last tag
#
# In CI: workflow runs `git cliff --bump --output CHANGELOG.md` on release
# and commits the result back to main.

[changelog]
# Header for the changelog file
header = """
# Changelog

All notable changes to **cognitive-discovery-system** will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
# Template for each release section
body = """
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits | sort(attribute="message") %}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | split(pat="\n") | first | trim | upper_first }}{% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id | truncate(length=7, end="") }}){% endif %})
{% endfor %}
{% endfor %}

"""
# Footer
footer = """
<!-- generated by git-cliff -->
"""
# Trim the template
trim = true

[git]
# Parse commits grouped by tag
conventional_commits = false
# Filter out merge commits
filter_merges = true
# Use the date of the tag
date_order = true
# Sort tags topologically
sort_commits = "oldest"

[tag]
# Render tag messages like: [v0.9.0b1] instead of just 0.9.0b1
name = "v"

[commit]
# Single-line commit messages
message = "."
# Skip commits with these prefixes in the message
skip = [
    "Merge",
    "wip",
    "WIP",
]
# Group commits by these labels
# (not used since conventional_commits = false; kept for future use)

[[changelog.group]]
# Commits touching tests/ go in Tests
pattern = "^[Tt]est"
group = "Testing"

[[changelog.group]]
# Commits touching docs/ go in Documentation
pattern = "^[Dd]oc[s]?:"
group = "Documentation"

[[changelog.group]]
# Commits touching ci/ or .github/ go in CI
pattern = "^[Cc][Ii]:"
group = "CI"

[[changelog.group]]
# Commits about deps
pattern = "^[Dd]ep"
group = "Dependencies"

[[changelog.group]]
# Release commits become a special "Release" group at the top
pattern = "^release:"
group = "Release"

[[changelog.group]]
# Default group
pattern = ".*"
group = "Changed"

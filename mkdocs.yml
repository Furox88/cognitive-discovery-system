site_name: Cognitive Discovery System
site_url: https://Furox88.github.io/cognitive-discovery-system/
repo_url: https://github.com/Furox88/cognitive-discovery-system
repo_name: Furox88/cognitive-discovery-system

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting Started:
      - English: getting-started.md
      - Türkçe: getting-started.tr.md
  - Tutorials:
      - Quick Start: tutorials/quick_start.md
      - Core Data Models: tutorials/core_demo.md
      - Scientific Formulas: tutorials/scientific_demo.md
      - Math Utilities: tutorials/math_utils_demo.md
      - Numerical Integration: tutorials/numerical_integration_demo.md
      - Differential Equations: tutorials/diffeq_demo.md
      - Monte Carlo: tutorials/montecarlo_demo.md
      - Probability: tutorials/probability_demo.md
      - Graph Algorithms: tutorials/graph_demo.md
      - Mathematical Modeling: tutorials/modeling_demo.md
      - Knowledge Organization: tutorials/knowledge_demo.md
      - Data Analysis: tutorials/data_analysis_demo.md
      - Hypothesis Engine: tutorials/hypothesis_demo.md
      - Quantum Lab: tutorials/quantum_demo.md
      - NLP Visualisation: tutorials/nlp_viz.md
      - Optimization: tutorials/optimization_demo.md
      - Signal Processing: tutorials/signals_demo.md
      - Machine Learning: tutorials/ml_demo.md
      - Statistics: tutorials/stats_demo.md
  - API Reference: api.md
  - Case Studies:
      - Hubble Tension: CASE_STUDY_HUBBLE.md
      - Quantum-ML: CASE_STUDY_QUANTUM_ML.md
  - Research Workflows: research-workflows.md
  - Performance: benchmarks.md
  - Maintenance: maintenance.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

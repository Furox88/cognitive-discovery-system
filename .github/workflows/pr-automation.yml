name: PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to trigger Codex review for'
        required: true
        type: string
      review_focus:
        description: 'Focus of Codex review'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - tests
          - security
          - performance

jobs:
  labeler:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

  codex-review:
    runs-on: ubuntu-latest
    # Trigger on label 'codex-review' or manual dispatch
    if: |
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'codex-review')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            let prNumber = context.issue ? context.issue.number : null;
            
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt('${{ inputs.pr_number }}');
            }
            
            if (!prNumber) {
              console.log('No PR number');
              return;
            }
            
            const focus = context.eventName === 'workflow_dispatch' ? '${{ inputs.review_focus }}' : 'full';
            
            // Check for existing Codex comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            
            const hasCodexComment = comments.some(c => 
              c.body.includes('Codex Review') && c.user.type === 'Bot'
            );
            
            if (hasCodexComment) {
              console.log('Codex review comment already exists');
              return;
            }
            
            let reviewBody = `## 🤖 Codex Review (Focus: ${focus})
            
            **Note:** This is a simulated Codex review comment. With actual Codex access via the Open Source program, this would be generated by analyzing the PR diff for:
            - Code quality and style issues
            - Missing tests or edge cases
            - Security concerns
            - Performance improvements
            - Documentation updates
            
            Maintainer can trigger full Codex analysis via this workflow or by labeling the PR with 'codex-review'.
            
            **Example suggestions (in real run):**
            - Consider adding type hints for better maintainability
            - Add test coverage for the new error handling path
            - The loop could be optimized using list comprehension for readability
            
            All Codex outputs will be reviewed by the maintainer before any changes are made.`;
            
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: reviewBody
            });
            
            console.log(`Posted Codex review note for PR #${prNumber}`);

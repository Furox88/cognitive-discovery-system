name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,dev,docs]"

    - name: Lint with Ruff
      run: ruff check .

    - name: Format check with Ruff
      run: ruff format --check .

    - name: Type check with Mypy (src)
      run: mypy src/

    - name: Type check with Mypy (tests)
      run: mypy tests/

    - name: Run tests with pytest
      shell: bash
      run: |
        set -e
        # Reference cell (Linux + Python 3.12) enforces the coverage gate.
        # Other cells run the test suite for cross-platform coverage but
        # don't enforce the gate; --no-cov-on-fail keeps a single 1-line
        # branch miss from breaking the whole matrix. The gate is set in
        # pyproject.toml [tool.coverage.report] fail_under = 99.
        if [ "$RUNNER_OS" = "Linux" ] && [ "${{ matrix.python-version }}" = "3.12" ]; then
          pytest tests/ --cov=cds --cov-branch --cov-report=xml --cov-report=term
        else
          pytest tests/ --cov=cds --cov-branch --cov-report=term --no-cov-on-fail
        fi

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: mkdocs build --strict

  audit:
    # Security scan of the resolved dependency environment with pip-audit.
    # Runs once on the reference cell (Linux + Python 3.12), installing the
    # project the same way the test job does, then auditing the installed
    # environment against the PyPI Advisory database.
    #
    # Currently NON-BLOCKING (continue-on-error): the dev/docs/test
    # toolchain (jupyter, mkdocs, build, twine, pillow, lxml, ...) carries
    # transitive deps with open CVEs that are unrelated to the published
    # runtime (typer/pydantic/rich, which audit clean). Surfacing them in
    # every CI run gives visibility without red-flashing the matrix on a
    # fresh advisory. Flip to blocking once requirements.lock is regenerated.
    name: pip-audit on Linux with Python 3.12
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,dev,docs]"
        pip install pip-audit

    - name: Audit installed environment for known vulnerabilities
      run: pip-audit --strict

  pre-commit:
    name: pre-commit on Linux with Python 3.12
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1
      env:
        # Skip mypy in CI hook (already covered by the test job).
        SKIP: mypy

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,dev,docs]"

    - name: Lint with Ruff
      run: ruff check .

    - name: Format check with Ruff
      run: ruff format --check .

    - name: Type check with Mypy (src)
      run: mypy src/

    - name: Type check with Mypy (tests)
      run: mypy tests/

    - name: Run tests with pytest
      shell: bash
      run: |
        set -e
        # Reference cell (Linux + Python 3.12) enforces the blended coverage
        # gate (statement + branch). Other cells run the test suite for
        # cross-platform coverage but don't enforce the gate; --no-cov-on-fail
        # keeps a single 1-line branch miss on a non-reference platform from
        # breaking the whole matrix. The gate is set in pyproject.toml
        # [tool.coverage.report] fail_under = 100.
        if [ "$RUNNER_OS" = "Linux" ] && [ "${{ matrix.python-version }}" = "3.12" ]; then
          pytest tests/ --cov=cds --cov-branch --cov-report=xml --cov-report=term
        else
          pytest tests/ --cov=cds --cov-branch --cov-report=term --no-cov-on-fail
        fi

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: mkdocs build --strict

  audit:
    # Security scan of the committed lock files with pip-audit. Audits both
    # the runtime lock (requirements.lock → typer/pydantic/rich) and the
    # dev/docs/test lock (requirements-dev.lock → full toolchain) directly
    # against the PyPI Advisory database, so no install step is needed and
    # the result is environment-independent.
    #
    # BLOCKING: as of v1.0.4 both lock files regenerate clean (0 CVEs).
    # A fresh advisory will now fail CI until `pip-compile --upgrade` is
    # run — that is the intended signal to rotate the pins.
    name: pip-audit on Linux with Python 3.12
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install pip-audit
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit

    - name: Audit runtime lock (requirements.lock)
      run: pip-audit -r requirements.lock --strict

    - name: Audit dev/docs/test lock (requirements-dev.lock)
      run: pip-audit -r requirements-dev.lock --strict

  property-tests:
    # Hypothesis-driven property tests. Lives in its own job (rather than the
    # main `test` matrix) for two reasons:
    #   1. It installs the optional `[property]` extra (hypothesis), which the
    #      base `test` extra deliberately omits to keep that matrix lean. This
    #      job is what actually proves the extra resolves and is usable.
    #   2. Property tests are slower (Hypothesis searches + shrinks the input
    #      space) and don't need to run across the full 4×3 OS/Python matrix —
    #      the invariants are platform-independent. One Linux + 3.12 cell is
    #      the reference cell, matching the coverage-gating job's choice.
    # The suite itself (tests/test_property_invariants.py) skips gracefully via
    # pytest.importorskip when hypothesis is absent, so the main matrix's
    # `pytest tests/` run is unaffected even though it collects the file.
    #
    # Mypy note: the main matrix excludes this file from `mypy tests/` (see
    # pyproject.toml [tool.mypy].exclude) because hypothesis is absent there
    # and the missing-import noise is not a real defect. This job installs
    # hypothesis, so it owns the strict type-check for this file.
    name: property tests on Linux with Python 3.12
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      # `.[property,test,dev]` — hypothesis (the point of this job), pytest
      # (the runner), and mypy (this job owns the property file's strict
      # type-check, which the main matrix skips). `[property]` alone pulls
      # in neither pytest nor mypy; earlier incarnations failed with
      # `pytest: command not found` and then `mypy: command not found`.
      run: |
        python -m pip install --upgrade pip
        pip install ".[property,test,dev]"

    - name: Type check with Mypy (property suite)
      # Strict mypy against the property file. This is the *only* place that
      # type-checks it, because the main matrix excludes it (hypothesis
      # absent). `--strict` is explicit so the check does not silently relax
      # if the global config ever changes.
      run: mypy --strict tests/test_property_invariants.py

    - name: Run property-based tests
      # Run ONLY the property suite here — the main matrix already covers the
      # example-based suite. Isolating it keeps this job's signal clean: a
      # failure here means a Hypothesis search found a counterexample, not a
      # regression in an unrelated test.
      run: pytest tests/test_property_invariants.py -v

  pre-commit:
    name: pre-commit on Linux with Python 3.12
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1
      env:
        # Skip mypy in CI hook (already covered by the test job).
        SKIP: mypy

  # Aggregate "required" check. Branch protection requires a single status
  # check named `CI`, but the jobs above each report under their own matrix
  # names (e.g. "3.12 on ubuntu-latest", "pre-commit on Linux with Python 3.12").
  # This gate job runs after every other job and turns green only when all of
  # them succeed, exposing exactly one context for branch protection to gate on.
  # That lets merges happen via the normal flow instead of temporarily disabling
  # branch protection on every PR.
  CI:
    name: CI
    if: always()
    needs: [test, audit, property-tests, pre-commit]
    runs-on: ubuntu-latest
    steps:
      - name: Report overall result
        run: |
          echo "Aggregated results:"
          echo "  test.result           = ${{ needs.test.result }}"
          echo "  audit.result          = ${{ needs.audit.result }}"
          echo "  property-tests.result = ${{ needs.property-tests.result }}"
          echo "  pre-commit.result     = ${{ needs.pre-commit.result }}"
          # Fail unless every dependency succeeded. `needs.*.result` is one of
          # "success" | "failure" | "cancelled" | "skipped"; we only accept success.
          if [ "${{ needs.test.result }}" != "success" ] \
             || [ "${{ needs.audit.result }}" != "success" ] \
             || [ "${{ needs.property-tests.result }}" != "success" ] \
             || [ "${{ needs.pre-commit.result }}" != "success" ]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,dev,docs]"

    - name: Lint with Ruff
      run: ruff check .

    - name: Format check with Ruff
      run: ruff format --check .

    - name: Type check with Mypy
      run: mypy src/

    - name: Run tests with pytest
      run: |
        # Run tests with coverage on all matrix versions. The fail_under
        # threshold is set in pyproject.toml (currently 99) and applies
        # uniformly; this keeps the matrix consistent and avoids spurious
        # 1-statement misses from stdlib micro-differences across Python
        # versions. 100% is verified locally and the gap is documented.
        pytest tests/ --cov=cds --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build documentation
      run: mkdocs build --strict

  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1
      env:
        # Skip mypy in CI hook (already covered by the test job).
        SKIP: mypy

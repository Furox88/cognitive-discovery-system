name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,dev,docs]"

    - name: Lint with Ruff
      run: ruff check .

    - name: Format check with Ruff
      run: ruff format --check .

    - name: Type check with Mypy
      run: mypy src/

    - name: Run tests with pytest
      run: |
        # Enforce 100% statement coverage only on the release-gate Python
        # version (3.12). Older matrix versions may report a 1-2 statement
        # miss from stdlib differences; the 3.12 baseline is authoritative.
        if [ "${{ matrix.python-version }}" = "3.12" ]; then
          pytest tests/ --cov=cds --cov-report=xml --cov-report=term --cov-fail-under=100
        else
          pytest tests/ --cov=cds --cov-report=xml --cov-report=term
        fi

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build documentation
      run: mkdocs build --strict

  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1
      env:
        # Skip mypy in CI hook (already covered by the test job).
        SKIP: mypy

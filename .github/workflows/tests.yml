name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history for setuptools_scm

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[test,dev,docs]"

    - name: Lint with Ruff
      run: ruff check .

    - name: Format check with Ruff
      run: ruff format --check .

    - name: Type check with Mypy (src)
      run: mypy src/

    - name: Type check with Mypy (tests)
      run: mypy tests/

    - name: Run tests with pytest (reference cell: coverage gate)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: |
        # Reference cell: Linux + Python 3.12. The coverage gate
        # (--cov-fail-under) is enforced here via pyproject.toml
        # [tool.coverage.report] fail_under = 99. Branch coverage is
        # reported but not gated (see the comment in pyproject.toml).
        pytest tests/ --cov=cds --cov-branch --cov-report=xml --cov-report=term

    - name: Run tests with pytest (other matrix cells: report only)
      if: !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12')
      run: |
        # Non-reference cells run the test suite for cross-platform coverage.
        # They do not enforce the coverage gate; --no-cov-on-fail keeps a
        # single 1-line branch miss from breaking the whole matrix.
        pytest tests/ --cov=cds --cov-branch --cov-report=term --no-cov-on-fail

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Build documentation
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      run: mkdocs build --strict

  pre-commit:
    name: pre-commit (Linux + 3.12)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: pre-commit/action@v3.0.1
      env:
        # Skip mypy in CI hook (already covered by the test job).
        SKIP: mypy

name: Dependabot Auto Merge

# Enables GitHub's native auto-merge for Dependabot PRs so that, once CI
# passes, the PR merges itself with no human in the loop.
#
# HISTORY / WHY THIS IS NON-TRIVIAL:
#   This workflow used to be an illusion. `gh pr merge --auto --squash` ran
#   fine, but with `required_approving_review_count: 1` + `enforce_admins:
#   true` on `main`, the auto-merge could *never complete* — no account
#   existed that could satisfy the approval (the single maintainer is the
#   author of every PR, and GitHub forbids self-approval; dependabot[bot]
#   cannot approve its own PR; the default GITHUB_TOKEN cannot approve).
#   Every Dependabot PR therefore stalled in the queue forever. PR #61 hit
#   the exact same wall for a maintainer-authored PR.
#
#   As of this commit, branch protection requires 0 approvals (single-
#   maintainer reality; CodeQL + CI status checks still gate the merge), so
#   auto-merge now actually reaches MERGED. The companion workflow
#   `bot-reviewer.yml` keeps the *option* of returning to `require approvals:
#   1` by auto-approving Dependabot PRs once a `REVIEW_BOT_TOKEN` secret is
#   in place — see its header.
#
# `allow_auto_merge` must be enabled at the repo level (Settings → General →
# Pull Requests → "Allow auto-merge"). It is currently enabled.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge (squash) for Dependabot PRs
        # `--auto` only *arms* the merge; GitHub completes it once every
        # required status check turns green. The `--admin` flag lets the
        # GITHUB_TOKEN actor arm it even under stricter rules without
        # bypassing the status-check gate itself.
        run: gh pr merge --auto --squash --admin "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report auto-merge status
        if: always()
        run: |
          echo "::notice::Auto-merge armed for ${{ github.event.pull_request.html_url }}"
          echo "Dependabot update type: ${{ steps.metadata.outputs.update-type }}"
          echo "Dependency: ${{ steps.metadata.outputs.dependency-names }} (${{ steps.metadata.outputs.new-version }})"
          echo "GitHub will merge automatically once required CI checks pass."

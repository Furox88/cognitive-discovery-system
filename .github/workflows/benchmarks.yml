name: Benchmarks

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate benchmark report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # On tag pushes the checkout lands in detached HEAD at the tag, so
      # there is no branch to commit back to. Resolve the default branch
      # up front: tag push -> github.event.base_ref (refs/heads/main),
      # schedule/dispatch -> github.ref_name (main). The base_ref JSON
      # field is not auto-mapped to an env var, so pass it explicitly.
      - name: Resolve target branch
        id: target
        env:
          TARGET_BRANCH_REF: ${{ github.event.base_ref }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ -n "${TARGET_BRANCH_REF:-}" ]; then
            branch="${TARGET_BRANCH_REF#refs/heads/}"
          else
            branch="${GITHUB_REF_NAME}"
          fi
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "Resolved target branch: ${branch}"

      - name: Checkout (full history for SHA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install ".[all]"

      - name: Run benchmarks
        run: python benchmarks/run_benchmarks.py

      - name: Verify artifacts changed
        id: changed
        run: |
          if git diff --quiet docs/benchmarks.md benchmarks/results.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # main is protected (PR + 1 approval), so a direct bot push is
      # rejected with GH006. Instead, open a PR with the regenerated
      # artifacts; it merges through the normal review flow, keeping
      # branch protection intact. create-pull-request auto-commits on
      # the remote branch and only acts when there are uncommitted
      # changes (guarded by steps.changed above).
      - name: Open PR with regenerated artifacts
        if: steps.changed.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "ci(benchmarks): regenerate report and results.json"
          branch: ci/benchmark-regen
          title: "ci(benchmarks): regenerate report and results.json"
          body: |
            Automated benchmark regeneration from ${{ github.event_name }} trigger.

            - `docs/benchmarks.md`
            - `benchmarks/results.json`

            Generated by the Benchmarks workflow. No code changes.
          committer: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          add-paths: |
            docs/benchmarks.md
            benchmarks/results.json

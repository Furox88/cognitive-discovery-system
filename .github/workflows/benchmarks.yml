name: Benchmarks

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate benchmark report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # On tag pushes the checkout would land in detached HEAD at the tag, so
      # there is no branch to commit back to. Always target the repo's default
      # branch (main): tag/schedule/dispatch all check out main, run the
      # benchmarks, and open a PR back into main. This mirrors changelog.yml
      # (ref: main, base: main) which is the proven working pattern in this
      # repo. Previously this resolved the branch from github.event.base_ref
      # with a GITHUB_REF_NAME fallback, but base_ref is empty on most tag
      # pushes and GITHUB_REF_NAME is the *tag name* (e.g. "v1.1.2"), not a
      # branch — create-pull-request then tried to rebase onto a tag ref and
      # failed every release with "cannot update ref 'refs/heads/v1.1.2'".
      - name: Checkout default branch (full history for SHA)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install ".[all]"

      - name: Run benchmarks
        run: python benchmarks/run_benchmarks.py

      - name: Verify artifacts changed
        id: changed
        run: |
          if git diff --quiet docs/benchmarks.md benchmarks/results.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # main is protected (PR + required status checks), so a direct bot
      # push is rejected with GH006. Instead, open a PR with the regenerated
      # artifacts; it merges through the normal review flow, keeping branch
      # protection intact. create-pull-request auto-commits on the remote
      # branch and only acts when there are uncommitted changes (guarded by
      # steps.changed above). base is always the default branch (main)
      # regardless of trigger.
      #
      # CONFIG GUARD: if the shared App is not configured yet, stop cleanly
      # with a green job instead of letting create-github-app-token throw
      # "Input required and not supplied: app-id" and turn every scheduled
      # / release run red. The guard pattern mirrors bot-reviewer.yml. Once
      # secrets BOT_APP_ID + BOT_APP_PRIVATE_KEY are added this branch is
      # always taken.
      - name: Check App credentials configured
        id: cfg
        env:
          APP_ID: ${{ secrets.BOT_APP_ID }}
        run: |
          if [[ -n "$APP_ID" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::BOT_APP_ID not set — Benchmarks cannot open a PR that triggers CI. Stopping cleanly (see header)."
          fi

      # TOKEN CHOICE — why a GitHub App token, not the default GITHUB_TOKEN:
      # A PR opened with the built-in GITHUB_TOKEN does NOT trigger
      # downstream `pull_request` workflows (CI, CodeQL). GitHub blocks
      # those runs to prevent recursive loops. The result was that every
      # benchmark PR stayed `action_required` (0s, never ran) under branch
      # protection and could only be unblocked by a manual empty commit
      # pushed under a real user token — see PR #65. A short-lived GitHub
      # App installation token is exempt from this restriction, so the CI
      # and CodeQL checks fire normally and the PR can merge unattended.
      # See CHANGELOG / docs for the one-time App + secret setup steps.
      - name: Generate GitHub App token (triggers downstream CI)
        id: app-token
        if: steps.cfg.outputs.configured == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Open PR with regenerated artifacts
        if: steps.changed.outputs.changed == 'true' && steps.cfg.outputs.configured == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          # base must be a branch, not a tag. On tag pushes the workspace
          # checkout targets main (see above), so always pass the repo's
          # default branch explicitly rather than letting
          # create-pull-request infer it (which previously resolved to the
          # tag name and crashed).
          base: ${{ github.event.repository.default_branch }}
          commit-message: "ci(benchmarks): regenerate report and results.json"
          branch: ci/benchmark-regen
          title: "ci(benchmarks): regenerate report and results.json"
          body: |
            Automated benchmark regeneration from ${{ github.event_name }} trigger.

            - `docs/benchmarks.md`
            - `benchmarks/results.json`

            Generated by the Benchmarks workflow. No code changes.
          add-paths: |
            docs/benchmarks.md
            benchmarks/results.json

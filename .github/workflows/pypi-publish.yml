name: PyPI Publish

on:
  push:
    tags:
      - 'v*'

# Prevent concurrent workflow runs from racing on the same tag.
concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-n-publish:
    name: Build and publish Python 🐐 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
    steps:
    - name: Pin Node.js 24 (avoid Node 20 deprecation warnings)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pypa/build
      run: python -m pip install --upgrade build

    - name: Build a binary wheel and a source tarball
      run: python -m build

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # Use a PyPI API token (stored as a repo secret). The previous OIDC
        # (trusted publishing) setup was rejected by PyPI with 403 because no
        # trusted publisher was configured on the project side.
        password: ${{ secrets.PYPI_API_TOKEN }}

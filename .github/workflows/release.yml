name: Release

# Fully automated publish: pushing a `v*` tag builds the sdist + wheel,
# uploads them to PyPI using a scoped API token (PYPI_API_TOKEN repo
# secret), and creates a GitHub Release with the artifacts attached. The
# Attest Release Artifacts workflow then fires on `release: published`
# and signs them.
#
# Setup (one-time): create a PyPI API token scoped to
# `cognitive-discovery-system` (Account → API tokens), then add it as a
# repository secret named `PYPI_API_TOKEN`:
#   gh secret set PYPI_API_TOKEN < ~/.pypi-token
#
# This is the sole publish authority: `scripts/publish.py` no longer
# uploads to PyPI or creates the GitHub release — it only builds, tests,
# pushes the tag (which triggers this workflow), and deploys docs.
# Reference: https://docs.pypi.org/trusted-publishers/using-no-api-key/
#            (token path: https://packaging.python.org/en/latest/tutorials/packaging-projects/#uploading-the-distribution-archives)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release + upload artifacts
  deployments: write   # create + status the pypi deployment record

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify the built package name
        run: |
          python - <<'PY'
          import zipfile, pathlib, sys
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              sys.exit("No wheel produced")
          meta = zipfile.ZipFile(wheels[0]).read(next(
              n for n in zipfile.ZipFile(wheels[0]).namelist()
              if n.endswith("METADATA")
          )).decode()
          name = dict(
              line.split(": ", 1) for line in meta.splitlines()
              if ": " in line and line.split(": ", 1)[0] in {"Name", "Version"}
          )
          print(f"Built: {name}")
          if name["Name"] != "cognitive-discovery-system":
              sys.exit(f"Unexpected package name: {name['Name']!r}")
          print("Package name OK.")
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI + GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # NOTE: we intentionally do NOT use `environment: pypi` here. That key
    # makes GitHub auto-create a deployment record on every release, but
    # neither `pypa/gh-action-pypi-publish` nor `gh release create` emits a
    # deployment_status event, so the record is never closed and eventually
    # shows up as "failed" on the Deployments page. Instead we create the
    # deployment explicitly below and mark it success/failure with
    # `if: always()`, so each release produces exactly one green (or red)
    # pypi deployment entry.
    steps:
      - name: Create pypi deployment record
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: "pypi",
              transient_environment: false,
              production_environment: false,
              auto_merge: false,
              required_contexts: []
            });
            core.info(`Created deployment #${deployment.data.id} for ${context.ref}`);
            core.setOutput("id", deployment.data.id);

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (API token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag exists; uploading artifacts."
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" dist/* --clobber
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --generate-notes --title "$tag" dist/*
          fi

      - name: Set pypi deployment status
        if: always() && steps.deployment.outputs.id != ''
        uses: actions/github-script@v7
        with:
          script: |
            const state = "${{ job.status }}" === "success" ? "success" : "failure";
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state,
              environment_url: "https://pypi.org/project/cognitive-discovery-system/",
              description: `PyPI publish ${state}`
            });
            core.info(`Deployment #${{ steps.deployment.outputs.id }} marked ${state}`);

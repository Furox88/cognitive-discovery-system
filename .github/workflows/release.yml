name: Release

# Fully automated publish: pushing a `v*` tag builds the sdist + wheel,
# uploads them to PyPI using a scoped API token (PYPI_API_TOKEN repo
# secret), and creates a GitHub Release with the artifacts attached. The
# Attest Release Artifacts workflow then fires on `release: published`
# and signs them.
#
# Setup (one-time): create a PyPI API token scoped to
# `cognitive-discovery-system` (Account → API tokens), then add it as a
# repository secret named `PYPI_API_TOKEN`:
#   gh secret set PYPI_API_TOKEN < ~/.pypi-token
#
# This is the sole publish authority: `scripts/publish.py` no longer
# uploads to PyPI or creates the GitHub release — it only builds, tests,
# pushes the tag (which triggers this workflow), and deploys docs.
# Reference: https://docs.pypi.org/trusted-publishers/using-no-api-key/
#            (token path: https://packaging.python.org/en/latest/tutorials/packaging-projects/#uploading-the-distribution-archives)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release + upload artifacts

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify the built package name
        run: |
          python - <<'PY'
          import zipfile, pathlib, sys
          wheels = list(pathlib.Path("dist").glob("*.whl"))
          if not wheels:
              sys.exit("No wheel produced")
          meta = zipfile.ZipFile(wheels[0]).read(next(
              n for n in zipfile.ZipFile(wheels[0]).namelist()
              if n.endswith("METADATA")
          )).decode()
          name = dict(
              line.split(": ", 1) for line in meta.splitlines()
              if ": " in line and line.split(": ", 1)[0] in {"Name", "Version"}
          )
          print(f"Built: {name}")
          if name["Name"] != "cognitive-discovery-system":
              sys.exit(f"Unexpected package name: {name['Name']!r}")
          print("Package name OK.")
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI + GitHub Release
    needs: build
    runs-on: ubuntu-latest
    environment: pypi   # Creates the pypi deployment record (green on next release)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (API token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag exists; uploading artifacts."
            gh release upload "$tag" --repo "$GITHUB_REPOSITORY" dist/* --clobber
          else
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --generate-notes --title "$tag" dist/*
          fi

  sync-about:
    # Keeps the repo "About" description in lockstep with each release so
    # the version + test count on the GitHub sidebar never drifts stale.
    # Counts tests from the working tree (no deps install needed for --co)
    # and reads the version straight out of the checked-out package.
    name: Sync repo About (version + test count)
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version + test count, update description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pip install --quiet pytest  # only the collector, no project deps
          VERSION=$(python -c "import re, pathlib; \
              print(re.search(r'__version__ = \"([^\"]+)\"', \
              pathlib.Path('src/cds/_version.py').read_text()).group(1))")
          TESTS=$(pytest --co -q 2>/dev/null | grep -oE '[0-9]+ tests collected' \
              | grep -oE '^[0-9]+' || echo 0)
          DESC="Cognitive Discovery System — pure Python scientific computing. 17 modules: quantum, ML, NLP, graph theory, Monte Carlo, ODE solvers, FFT, optimization, probability, statistics, symbolic math, knowledge graph. ${TESTS} tests, 100% coverage, v${VERSION}."
          echo "New description: $DESC"
          gh repo edit "$GITHUB_REPOSITORY" --description "$DESC"

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Run tests
        run: pytest tests/ -q

      - name: Lint
        run: ruff check .

      - name: Build package
        run: python -m build

      - name: Create GitHub Release with conventional changelog
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          body: |
            ## What's Changed
            
            This release was prepared with maintainer automation.
            
            In the future, Codex will be used to:
            - Generate detailed change summaries
            - Suggest release notes based on commit messages
            - Review the release PR for completeness
            
            Full changelog generated from commits.

      - name: Publish to PyPI (if token present)
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

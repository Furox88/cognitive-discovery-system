name: Generate CHANGELOG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (not the tag, to avoid detached HEAD)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --tag ${{ github.ref_name }} --output CHANGELOG.md

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with regenerated CHANGELOG
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(changelog): regenerate for ${{ github.ref_name }}"
          title: "docs(changelog): regenerate for ${{ github.ref_name }}"
          body: |
            Auto-generated CHANGELOG update from git history.
            Triggered by: tag push `${{ github.ref_name }}`
          branch: chore/changelog-${{ github.ref_name }}
          base: main
          delete-branch: true
          add-paths: CHANGELOG.md

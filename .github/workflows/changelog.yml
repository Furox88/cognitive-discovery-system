name: Generate CHANGELOG

# Manual-only trigger. Previously fired on every `v*` tag push, but the
# `git cliff --output CHANGELOG.md` invocation rewrites the ENTIRE file from
# git history and discards the hand-curated narrative entries (see PR #24,
# which was closed because it regressed v1.0.4/v1.0.3/v1.0.2 sections back to
# commit-hash-only stubs). cliff.toml groups by commit-message prefix while the
# repo uses hand-written descriptive sections — the two styles conflict.
#
# To regenerate locally for review only (without overwriting the curated file):
#   git cliff --tag vX.Y.Z            # preview to stdout
#   git cliff --latest                # preview latest tag's section
# Run this workflow manually only if you intend to review the diff carefully
# and reconcile the generated output with the hand-written sections.
#
# IDEMPOTENCY: all dispatches target a SINGLE fixed branch
# (chore/changelog-regen). peter-evans/create-pull-request updates the existing
# open PR on that branch (force-push) instead of opening a duplicate, so stale
# PRs no longer accumulate across tags/releases (the previous per-tag branch
# scheme left up to 6 OPEN PRs open at once — see #10/#19/#20/#21/#22/#23,
# all closed as superseded). The git-diff guard below additionally skips the
# action entirely when CHANGELOG.md is unchanged.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate the changelog for (e.g. v1.0.4)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

# Serialize dispatches: two concurrent runs would both regenerate CHANGELOG.md
# and force-push the single shared branch, racing each other. The fixed
# group also prevents the duplicate-PR accumulation the old per-tag scheme
# caused.
concurrency:
  group: changelog-regen
  cancel-in-progress: false

jobs:
  changelog:
    name: Generate CHANGELOG
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (not the tag, to avoid detached HEAD)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --tag ${{ inputs.tag }} --output CHANGELOG.md

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Single fixed branch: create-pull-request updates the existing open PR
      # on this branch (force-push) rather than opening a duplicate, so only
      # one changelog PR is ever open at a time regardless of how many tags
      # are dispatched.
      #
      # TOKEN CHOICE — why a GitHub App token, not the default GITHUB_TOKEN:
      # A PR opened with the built-in GITHUB_TOKEN does NOT trigger the
      # `pull_request` CI/CodeQL workflows (GitHub blocks GITHUB_TOKEN-sourced
      # events from spawning new runs to prevent recursion). That left changelog
      # PRs stuck at `action_required` (0s) under branch protection. A
      # short-lived GitHub App installation token is exempt, so the required
      # checks fire and the PR can merge without a manual nudge. The same App
      # serves benchmarks.yml, changelog.yml, and bot-reviewer.yml.
      - name: Generate GitHub App token (triggers downstream CI)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Open or update PR with regenerated CHANGELOG
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "docs(changelog): regenerate for ${{ inputs.tag }}"
          title: "docs(changelog): regenerate for ${{ inputs.tag }} (MANUAL — review carefully)"
          body: |
            Auto-generated CHANGELOG update from git history.
            Triggered by MANUAL workflow_dispatch for tag `${{ inputs.tag }}`.

            REVIEW THE DIFF CAREFULLY before merging. git-cliff rewrites the
            entire CHANGELOG.md from commit history; hand-curated narrative
            entries (like the v1.0.4 "Security & Tooling" block) may be dropped
            and need to be reconciled manually. See PR #24 for the regression
            this caused under the previous tag-push trigger.

            This PR lives on a single fixed branch (`chore/changelog-regen`);
            re-running the workflow for a different tag updates this same PR
            instead of opening a new one.
          branch: chore/changelog-regen
          base: main
          delete-branch: true
          add-paths: CHANGELOG.md

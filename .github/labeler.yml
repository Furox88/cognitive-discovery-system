# Labeler config for auto-labeling PRs based on paths.
# v5 schema: each label maps to a list of config objects (changed from the
# v4 flat `label: [paths]` form). `any` matches if the PR touches ANY of the
# listed globs.
# See https://github.com/actions/labeler

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - README.md
          - CONTRIBUTING.md
          - CHANGELOG.md
          - examples/**

cli:
  - changed-files:
      - any-glob-to-any-file:
          - src/cds/cli.py
          - tests/test_cli.py

hypothesis:
  - changed-files:
      - any-glob-to-any-file:
          - src/cds/hypothesis/**
          - examples/hypothesis*.py
          - tests/test_hypothesis*.py

core:
  - changed-files:
      - any-glob-to-any-file:
          - src/cds/core/**
          - src/cds/__init__.py

tests:
  - changed-files:
      - any-glob-to-any-file:
          - tests/**
          - pytest.ini
          - pyproject.toml

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - pyproject.toml
